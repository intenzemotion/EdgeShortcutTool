name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Build release executable
        run: cargo build --release --locked

      - name: Prepare release package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Copy-Item "target\release\EdgeShortcutTool.exe" "dist\EdgeShortcutTool.exe"
          Copy-Item "README.md" "dist\README.md"

          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "dist\LICENSE"
          }

          Compress-Archive -Path "dist\*" -DestinationPath "EdgeShortcutTool-$version-Windows.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: EdgeShortcutTool-${{ github.ref_name }}-Windows
          path: EdgeShortcutTool-${{ github.ref_name }}-Windows.zip

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "EdgeShortcutTool-${{ github.ref_name }}-Windows.zip" `
            --title "Edge Shortcut Tool ${{ github.ref_name }}" `
            --generate-notes
